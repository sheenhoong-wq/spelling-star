# 方式一：不用自己build，直接用官方 nginx 挂载本文件夹
# 在本文件夹里执行：docker compose up -d
# 打开：http://<服务器IP>:8088
services:
  spelling-star:
    image: nginx:alpine
    container_name: spelling-star
    ports:
      - "8088:80"          # 左边 8088 可改成你想要的端口
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

# 方式二（可选）：用本文件夹里的 Dockerfile 自己构建镜像
#   把上面的 image 行换成下面两行：
#   build: .
#   （并删掉 volumes 里挂载网页的那一行）
